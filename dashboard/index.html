<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pursuits — tree dashboard</title>
<style>
  :root{
    --bg1:#0f172a; --bg2:#1e293b; --ink:#e2e8f0; --muted:#94a3b8;
    --card:#ffffff; --card-ink:#0f172a; --line:#475569;
    --c0:#6366f1; --c1:#0ea5e9; --c2:#10b981; --c3:#f59e0b; --c4:#ef4444; --c5:#a855f7;
    --font: ui-sans-serif,-apple-system,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:var(--font);background:
    radial-gradient(1200px 800px at 20% -10%, #243049 0%, transparent 60%),
    linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--ink);overflow:hidden}
  header{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;
    padding:14px 20px;z-index:10;
    background:linear-gradient(180deg,rgba(15,23,42,.85),rgba(15,23,42,0));backdrop-filter:blur(6px)}
  header h1{margin:0;font-size:18px;letter-spacing:.3px;font-weight:650}
  header .sub{color:var(--muted);font-size:12px;font-weight:500}
  .spacer{flex:1}
  .btns{display:flex;gap:8px}
  button{font:inherit;font-size:12px;font-weight:600;color:var(--ink);
    background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.25);
    padding:7px 12px;border-radius:9px;cursor:pointer;transition:.15s}
  button:hover{background:rgba(148,163,184,.22);border-color:rgba(148,163,184,.45)}
  button.primary{color:#fff;background:var(--c0);border-color:transparent}
  button.primary:hover{filter:brightness(1.08);background:var(--c0)}
  body:not(.server) #addnote{display:none}
  svg{width:100vw;height:100vh;display:block;cursor:grab}
  svg:active{cursor:grabbing}
  .link{fill:none;stroke-opacity:.5;stroke-width:1.6px}
  .node{cursor:pointer}
  .node rect{filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));transition:filter .15s}
  .node:hover rect{filter:drop-shadow(0 8px 22px rgba(0,0,0,.55))}
  .node text.label{font-size:13px;font-weight:600;fill:var(--card-ink)}
  .node text.label.root{font-size:15px;font-weight:750;letter-spacing:.2px}
  .node .count{font-size:10px;font-weight:700;fill:#fff}
  .docbtn{cursor:pointer}
  .docbtn:hover circle{filter:brightness(1.12)}
  .addbtn{cursor:pointer;opacity:0;transition:opacity .12s}
  .node:hover .addbtn{opacity:1}
  .addbtn:hover circle{filter:brightness(1.12)}
  body:not(.server) .addbtn{display:none}
  .hint{position:fixed;bottom:12px;left:20px;color:var(--muted);font-size:11px;z-index:10}

  /* add-note modal */
  .modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:rgba(2,6,23,.55);backdrop-filter:blur(3px)}
  .modal[hidden]{display:none}
  .sheet{width:min(440px,92vw);background:#0b1220;border:1px solid rgba(148,163,184,.25);
    border-radius:16px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .sheet h2{margin:0 0 4px;font-size:16px;font-weight:700}
  .sheet .ctx{color:var(--muted);font-size:12px;margin-bottom:14px}
  .sheet label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:10px 0 4px}
  .sheet input,.sheet textarea{width:100%;font:inherit;font-size:13px;color:var(--ink);
    background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.25);border-radius:9px;padding:9px 11px}
  .sheet input:focus,.sheet textarea:focus{outline:none;border-color:var(--c0)}
  .sheet textarea{resize:vertical}
  .sheet .row{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .sheet .msg{min-height:16px;margin-top:8px;font-size:12px;color:var(--c3)}
</style>
</head>
<body>
<header>
  <h1 id="title">Pursuits</h1>
  <span class="sub">tree dashboard</span>
  <div class="spacer"></div>
  <div class="btns">
    <button id="addnote" class="primary">＋ Add note</button>
    <button id="expand">Expand all</button>
    <button id="collapse">Collapse</button>
    <button id="fit">Fit</button>
  </div>
</header>
<svg></svg>
<div class="hint">doc icon = open/edit the doc · hover a node → ＋ adds a child note · click branch = expand/collapse · scroll = zoom · drag = pan</div>

<div id="modal" class="modal" hidden>
  <div class="sheet">
    <h2>Add note</h2>
    <div class="ctx" id="modal-ctx"></div>
    <label for="note-title">Title</label>
    <input id="note-title" type="text" placeholder="Short title (becomes the node + doc)">
    <label for="note-body">Note</label>
    <textarea id="note-body" rows="5" placeholder="What's the note? (optional — you can edit the doc later)"></textarea>
    <div class="row">
      <button id="note-cancel">Cancel</button>
      <button id="note-save" class="primary">Add note</button>
    </div>
    <div class="msg" id="note-msg"></div>
  </div>
</div>

<script src="./vendor/d3.min.js"></script>
<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
